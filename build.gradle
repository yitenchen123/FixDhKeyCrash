plugins {
    id 'fabric-loom' version '1.6.11'
    id 'java'
}

version = "1.0.0"
group = "com.example.fixdhkeycrash"

repositories {
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings "net.fabricmc:yarn:1.21.11+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.19.2"
}

loom {
    mixin {
        defaultRefmapName.set("mixins.fixdhkeycrash.refmap.json")
    }
}